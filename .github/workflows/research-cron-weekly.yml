name: Research weekly append

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        offset: [0, 5, 10, 15, 20, 25, 30, 35, 40]
    steps:
      - name: Invoke research-refresh (append)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sS -X POST "$SUPABASE_URL/functions/v1/research-refresh" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"mode\":\"append\",\"offset\":${{ matrix.offset }},\"limit\":1}"
